<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="lg2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#lg1)" opacity="0.15"/>
  <!-- Leaf body -->
  <path d="M32 8 C48 8, 56 20, 52 36 C48 50, 36 56, 20 52 C12 38, 16 18, 32 8Z" fill="url(#lg1)" opacity="0.9"/>
  <!-- Vein lines -->
  <path d="M32 8 L26 44" stroke="#fff" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>
  <path d="M26 30 C30 26, 38 24, 44 26" stroke="#fff" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <path d="M25 38 C29 35, 36 34, 41 36" stroke="#fff" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
  <path d="M26 22 C30 19, 37 18, 42 20" stroke="#fff" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <!-- Upward arrow / signal -->
  <path d="M26 52 L26 60 M26 60 L22 56 M26 60 L30 56" stroke="url(#lg2)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Hexagonal dots -->
  <circle cx="32" cy="18" r="2.5" fill="#fff" opacity="0.8"/>
  <circle cx="40" cy="26" r="2" fill="#fff" opacity="0.65"/>
  <circle cx="38" cy="38" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="29" cy="34" r="1.8" fill="#fff" opacity="0.55"/>
</svg>